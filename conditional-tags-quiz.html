<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Thi Tiếng Anh 9 - Hệ Điểm 10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .option-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <!-- Màn Hình Đăng Nhập -->
    <div id="setup-screen" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center transition-all">
        <div class="mb-6">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Kiểm Tra Tiếng Anh 9</h1>
            <p class="text-slate-500 mt-2">Chuyên đề: Câu điều kiện & Câu hỏi đuôi</p>
        </div>
        
        <div class="space-y-4">
            <div class="text-left">
                <label class="block text-sm font-semibold text-slate-700 mb-1">Họ và tên của em:</label>
                <input type="text" id="student-name" placeholder="Ví dụ: Nguyễn Văn A" 
                    class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all">
            </div>
            <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-1">
                Bắt đầu làm bài
            </button>
            <p class="text-xs text-slate-400 italic">* Hệ thống sẽ ghi tên em vào bảng điểm cuối cùng.</p>
        </div>
    </div>

    <!-- Màn Hình Làm Bài -->
    <div id="quiz-screen" class="hidden w-full max-w-2xl">
        <!-- Header Cố Định -->
        <div class="bg-white rounded-t-2xl shadow-sm p-4 border-b border-slate-100 flex justify-between items-center sticky top-0 z-10">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-600 text-white p-1.5 rounded-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                    </svg>
                </div>
                <span id="header-name" class="font-bold text-slate-700 truncate max-w-[150px]">Học sinh</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-sm font-medium text-slate-500">
                    Câu: <span id="current-index" class="text-blue-600">1</span>/20
                </div>
                <div id="timer" class="bg-amber-50 text-amber-600 px-3 py-1 rounded-full text-sm font-bold border border-amber-100">
                    00:00
                </div>
            </div>
        </div>

        <!-- Vùng Câu Hỏi -->
        <div class="bg-white p-6 md:p-8">
            <h2 id="question-text" class="text-xl font-semibold text-slate-800 leading-relaxed mb-6">
                Loading question...
            </h2>
            <div id="options-grid" class="space-y-3">
                <!-- Đáp án sẽ load ở đây -->
            </div>
        </div>

        <!-- Footer Phản Hồi -->
        <div id="feedback-area" class="hidden bg-slate-50 p-6 border-t border-slate-100 rounded-b-2xl">
            <div id="feedback-status" class="flex items-center mb-2">
                <!-- Status icon/text -->
            </div>
            <p id="rationale-text" class="text-slate-600 text-sm italic mb-4"></p>
            <button id="next-btn" onclick="nextQuestion()" class="w-full md:w-auto px-8 py-2 bg-slate-800 hover:bg-slate-900 text-white font-semibold rounded-lg float-right transition-colors">
                Tiếp tục
            </button>
            <div class="clear-both"></div>
        </div>
    </div>

    <!-- Màn Hình Kết Quả -->
    <div id="result-screen" class="hidden w-full max-w-lg bg-white rounded-2xl shadow-2xl p-8 text-center">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Kết Quả Bài Thi</h1>
        <p id="result-user" class="text-lg font-semibold text-blue-600 mb-6 underline decoration-2 underline-offset-4"></p>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-green-50 p-4 rounded-xl border border-green-100">
                <span class="block text-green-600 text-2xl font-bold" id="res-correct">0</span>
                <span class="text-xs text-green-700 uppercase font-bold tracking-wider">Câu đúng</span>
            </div>
            <div class="bg-red-50 p-4 rounded-xl border border-red-100">
                <span class="block text-red-600 text-2xl font-bold" id="res-wrong">0</span>
                <span class="text-xs text-red-700 uppercase font-bold tracking-wider">Câu sai</span>
            </div>
        </div>

        <div class="mb-8">
            <span class="text-sm text-slate-500 block mb-1 uppercase font-bold tracking-widest">Điểm số (Hệ 10)</span>
            <div class="text-6xl font-black text-slate-900" id="res-score">0.0</div>
        </div>

        <div class="flex space-x-3">
            <button onclick="location.reload()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition-all">
                Làm lại
            </button>
            <button onclick="window.print()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-100 transition-all">
                Lưu kết quả
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "If we cut down more trees, there _______ more floods.", options: ["will be", "would be", "were", "are"], correct: 0, why: "Câu ĐK loại 1 (If + HTĐ, S + will + V) diễn tả sự việc có thể xảy ra ở tương lai." },
            { q: "You have seen this movie before, _______?", options: ["haven't you", "have you", "don't you", "didn't you"], correct: 0, why: "Phần đuôi phải ngược dấu với phần chính. 'Have seen' (khẳng định) -> 'haven't' (phủ định)." },
            { q: "If I had enough money, I _______ a new laptop.", options: ["bought", "would buy", "will buy", "would have bought"], correct: 1, why: "Câu ĐK loại 2 (If + QKĐ, S + would + V) giả định điều không có thật ở hiện tại." },
            { q: "Everything is okay, _______?", options: ["isn't it", "is it", "aren't they", "isn't everything"], correct: 0, why: "Đại từ bất định 'Everything' chuyển thành 'it', vế trước khẳng định nên đuôi phủ định." },
            { q: "If he _______ his umbrella, he wouldn't have got wet.", options: ["took", "had taken", "takes", "would take"], correct: 1, why: "Câu ĐK loại 3 (If + QKHT, S + would have P2) giả định trái ngược với quá khứ." },
            { q: "I am a student, _______?", options: ["aren't I", "am not I", "am I", "don't I"], correct: 0, why: "Đây là dạng đặc biệt của câu hỏi đuôi: I am -> aren't I." },
            { q: "If you don't hurry, you _______ the bus.", options: ["miss", "will miss", "would miss", "missed"], correct: 1, why: "Câu ĐK loại 1, vế chính dùng 'will + V'." },
            { q: "Let's play soccer, _______?", options: ["shall we", "will you", "don't we", "should we"], correct: 0, why: "Lời mời với 'Let's' luôn có câu hỏi đuôi là 'shall we'." },
            { q: "If I were a bird, I _______ fly everywhere.", options: ["will", "can", "would", "shall"], correct: 2, why: "Câu ĐK loại 2, vế chính dùng 'would/could + V'." },
            { q: "Don't make noise in class, _______?", options: ["do you", "will you", "won't you", "shall we"], correct: 1, why: "Câu mệnh lệnh (dù khẳng định hay phủ định) đều dùng đuôi 'will you'." },
            { q: "If you _______ the doctor's advice, you would have recovered faster.", options: ["follow", "followed", "had followed", "will follow"], correct: 2, why: "Câu ĐK loại 3 (quá khứ hoàn thành sau If)." },
            { q: "Nobody called me, _______?", options: ["did they", "didn't they", "did he", "didn't he"], correct: 0, why: "Nobody mang nghĩa phủ định, nên đuôi phải khẳng định. Chủ ngữ Nobody -> they." },
            { q: "If she _______ free this weekend, she will go shopping.", options: ["is", "was", "will be", "be"], correct: 0, why: "Câu ĐK loại 1, sau If chia hiện tại đơn (is) theo chủ ngữ 'she'." },
            { q: "You should study harder, _______?", options: ["should you", "shouldn't you", "ought to you", "don't you"], correct: 1, why: "Đuôi lặp lại động từ khuyết thiếu 'should' ở dạng phủ định." },
            { q: "If I _______ the truth, I wouldn't have been so angry.", options: ["know", "knew", "had known", "have known"], correct: 2, why: "Câu ĐK loại 3 (giả định quá khứ)." },
            { q: "He seldom goes out at night, _______?", options: ["doesn't he", "does he", "is he", "isn't he"], correct: 1, why: "Seldom mang nghĩa phủ định -> đuôi khẳng định 'does he'." },
            { q: "If they _______ enough water, the plants will die.", options: ["don't get", "didn't get", "won't get", "not get"], correct: 0, why: "Câu ĐK loại 1, phủ định hiện tại đơn của động từ thường." },
            { q: "You'd rather stay at home, _______?", options: ["wouldn't you", "hadn't you", "didn't you", "won't you"], correct: 0, why: "You'd rather = You would rather -> đuôi wouldn't." },
            { q: "If I _______ you, I wouldn't buy that expensive car.", options: ["am", "were", "was", "had been"], correct: 1, why: "Cấu trúc đưa lời khuyên (ĐK loại 2): If I were you." },
            { q: "There are 20 questions in this test, _______?", options: ["aren't there", "are there", "aren't they", "isn't there"], correct: 0, why: "Chủ ngữ 'There' được giữ nguyên ở phần đuôi." }
        ];

        let currentIdx = 0;
        let score = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let timerInterval;
        let totalSeconds = 0;
        let studentName = "";

        function startQuiz() {
            studentName = document.getElementById('student-name').value.trim();
            if(!studentName) {
                alert("Em vui lòng nhập tên trước khi bắt đầu nhé!");
                return;
            }
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('header-name').innerText = studentName;
            
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                totalSeconds++;
                const mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
                const secs = (totalSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function renderQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('current-index').innerText = currentIdx + 1;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('feedback-area').classList.add('hidden');
            
            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-card w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-200 hover:bg-blue-50 transition-all font-medium text-slate-700 flex justify-between items-center";
                btn.innerHTML = `<span>${opt}</span> <div class="dot w-4 h-4 rounded-full border border-slate-300"></div>`;
                btn.onclick = () => selectOption(i, btn);
                optionsGrid.appendChild(btn);
            });
        }

        function selectOption(idx, element) {
            const q = quizData[currentIdx];
            const allOptions = document.querySelectorAll('.option-card');
            
            // Khóa các lựa chọn
            allOptions.forEach(btn => btn.disabled = true);
            
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackStatus = document.getElementById('feedback-status');
            const rationaleText = document.getElementById('rationale-text');
            feedbackArea.classList.remove('hidden');
            
            if(idx === q.correct) {
                correctCount++;
                element.classList.remove('border-slate-100');
                element.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                element.querySelector('.dot').classList.add('bg-green-500', 'border-green-500');
                
                feedbackStatus.innerHTML = '<span class="text-green-600 font-bold flex items-center text-lg"><svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg> Tuyệt vời! +0.5 điểm</span>';
            } else {
                wrongCount++;
                element.classList.remove('border-slate-100');
                element.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                element.querySelector('.dot').classList.add('bg-red-500', 'border-red-500');
                
                // Hiển thị đáp án đúng
                allOptions[q.correct].classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                
                feedbackStatus.innerHTML = '<span class="text-red-600 font-bold flex items-center text-lg"><svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg> Chưa chính xác</span>';
            }
            
            rationaleText.innerText = q.why;
            
            if(currentIdx === quizData.length - 1) {
                document.getElementById('next-btn').innerText = "Xem kết quả";
            }
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < quizData.length) {
                renderQuestion();
            } else {
                showFinalResult();
            }
        }

        function showFinalResult() {
            clearInterval(timerInterval);
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            document.getElementById('result-user').innerText = studentName;
            document.getElementById('res-correct').innerText = correctCount;
            document.getElementById('res-wrong').innerText = wrongCount;
            
            const finalScore = (correctCount * 0.5).toFixed(1);
            document.getElementById('res-score').innerText = finalScore;
            
            // Hiệu ứng màu điểm số
            const scoreEl = document.getElementById('res-score');
            if(finalScore >= 8) scoreEl.classList.add('text-green-600');
            else if(finalScore >= 5) scoreEl.classList.add('text-blue-600');
            else scoreEl.classList.add('text-red-600');
        }
    </script>
</body>
</html>
